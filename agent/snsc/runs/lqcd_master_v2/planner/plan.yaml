task:
  name: proton_distillation_2pt_Cg5g4
  description: >
    Compute the proton two-point correlation function using the distillation
    (Laplacian-Heaviside) method on the C24P29 ensemble (24^3×72, beta=6.20,
    a=0.1052 fm). Reads Nev=100 Laplace eigenmodes and precomputed momentum-smeared
    perambulators. Constructs VVV baryon blocks Φ_{ijk}(P,t) = Σ_x e^{-iP·x}
    ε_{abc} v_i^a v_j^b v_k^c (momentum-projection phase only; the smearing phase
    is already baked into the perambulators). Performs Wick contraction (direct
    minus exchange) with external spin indices σ' (sink) and σ (source), applying
    the Cg5g4 Dirac projector Γ = γ₃γ₁γ₄ at the sink and its conjugate
    Γ̄ = −Cg5g4 at the source. The raw output is a complex (Nt,Nt,4,4) matrix
    C_{σ'σ}. Applies two-sided parity projection P₊ = (I+γ₄)/2 as
    C_pp = Re Tr[P₊ C P₊^†]. Applies anti-periodic boundary sign correction
    for the three-quark baryon state. Scans five boost momenta
    Pz = −2,−3,−4,−5,−6 (units of 2π/L). Extracts effective masses via the
    arccosh method and compares with reference data.
  task_mode: freeform

ensemble:
  preset: C24P29
  cfg_path: /public/share/weiwang/clqcd/beta6.20_mu-0.2770_ms-0.2400_L24x72/Configurations/Original/beta6.20_mu-0.2770_ms-0.2400_L24x72_cfg_{n_cfg}.lime
  dimensions: [24, 24, 24, 72]
  boundary_conditions:
    spatial: periodic
    temporal: anti-periodic
  lattice_spacing: 0.1052
  anisotropy: 1.0
  quark_mass:
    light: -0.277
    strange: -0.2356
    charm: 0.4159
    bottom: 1.5
  xi_0: 1.0
  clover: 1.160920226
  multigrid: [[6, 6, 6, 3], [4, 4, 4, 6]]
  mpi_num: 4
  process_grid: [1, 1, 1, 4]

physics:
  observables: []
  hadrons: []
  propagators: []

